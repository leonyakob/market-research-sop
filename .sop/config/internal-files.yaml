# =============================================================================
# 行业研究SOP v3.0 - 内部文件处理接口配置
# =============================================================================
# 用途: 定义内部文件的处理规则、提取字段、隐私级别和融合策略
# 版本: v3.0
# 更新日期: 2026-04-03
#
# 使用说明:
# 1. 本配置文件定义了20种内部文件类型的处理规范
# 2. 所有内部文件标注时只写文件名，不写路径（涉密）
# 3. 高隐私级别文件需要特殊处理流程
# 4. 内部数据需与外部数据交叉验证，不假设绝对正确
# 5. 核心原则：融合而非覆盖，内部数据与外部数据并行比对
# =============================================================================

file_types:

# =============================================================================
# 一、市场与销售类 (Market & Sales)
# =============================================================================

- category: "市场与销售类"
  type: "市场调研原始数据"
  formats: [xlsx, csv]
  processing_rules:
    - "数据清洗：去除重复记录和异常值"
    - "字段标准化：统一日期格式、地区编码"
    - "样本校验：检查样本量是否满足统计要求"
  extraction_fields:
    - "调研时间"
    - "样本规模"
    - "调研方法"
    - "核心指标"
    - "置信区间"
  annotation_format: "【内部-市场数据-调研原始数据_{项目名称}_{日期}.xlsx】"
  privacy_level: "medium"
  fusion_rule: "与外部行业报告数据交叉验证，标注数据来源差异"

- category: "市场与销售类"
  type: "销售数据"
  formats: [xlsx, csv]
  processing_rules:
    - "脱敏处理：隐藏具体客户名称，使用编码替代"
    - "时间对齐：统一为月度/季度维度"
    - "渠道归类：标准化渠道命名"
  extraction_fields:
    - "时间维度"
    - "销售渠道"
    - "区域分布"
    - "SKU分类"
    - "销售额/量"
    - "增长率"
  annotation_format: "【内部-市场数据-销售数据_{渠道}_{区域}_{SKU}_{时间}.xlsx】"
  privacy_level: "high"
  fusion_rule: "与外部市场规模数据对比，计算市场份额"

- category: "市场与销售类"
  type: "渠道分布与经销商名录"
  formats: [xlsx, csv, pdf]
  processing_rules:
    - "敏感信息脱敏：经销商联系方式部分隐藏"
    - "地理编码：统一使用标准行政区划代码"
    - "分级标注：标注核心/重要/一般经销商"
  extraction_fields:
    - "经销商编码"
    - "所属区域"
    - "渠道类型"
    - "合作等级"
    - "覆盖范围"
  annotation_format: "【内部-市场数据-渠道分布_{日期}.xlsx】"
  privacy_level: "high"
  fusion_rule: "与外部渠道研究报告对比覆盖率"

- category: "市场与销售类"
  type: "消费者访谈纪要/问卷原始数据"
  formats: [xlsx, csv, docx]
  processing_rules:
    - "隐私脱敏：去除受访者姓名、联系方式"
    - "编码处理：开放题答案进行编码归类"
    - "质量筛选：剔除无效问卷"
  extraction_fields:
    - "受访者画像"
    - "核心洞察"
    - "痛点/需求"
    - "品牌认知"
    - "购买决策因素"
  annotation_format: "【内部-市场数据-消费者洞察_{调研主题}_{日期}.xlsx】"
  privacy_level: "medium"
  fusion_rule: "与外部消费者趋势报告交叉验证"

- category: "市场与销售类"
  type: "品牌资产追踪报告"
  formats: [xlsx, pdf, pptx]
  processing_rules:
    - "指标对齐：确保与外部品牌评估指标可比"
    - "趋势分析：计算同比/环比变化"
    - "对标整理：整理竞品品牌资产数据"
  extraction_fields:
    - "品牌知名度"
    - "品牌美誉度"
    - "品牌忠诚度"
    - "品牌联想"
    - "竞品对比"
  annotation_format: "【内部-市场数据-品牌资产_{品牌名}_{季度}.xlsx】"
  privacy_level: "medium"
  fusion_rule: "与外部品牌价值排行榜数据对比"

# =============================================================================
# 二、竞品与情报类 (Competitive Intelligence)
# =============================================================================

- category: "竞品与情报类"
  type: "竞品内部分析报告"
  formats: [xlsx, pdf, docx]
  processing_rules:
    - "来源标注：明确情报来源和可信度等级"
    - "时效性检查：标注信息获取时间"
    - "交叉验证：多源信息比对确认"
  extraction_fields:
    - "竞品名称"
    - "分析维度"
    - "核心发现"
    - "数据来源"
    - "可信度评级"
  annotation_format: "【内部-竞品情报-内部分析_{竞品名}_{日期}.pdf】"
  privacy_level: "high"
  fusion_rule: "与外部公开财报、新闻交叉验证"

- category: "竞品与情报类"
  type: "竞品价格监控表"
  formats: [xlsx, csv]
  processing_rules:
    - "时间戳记录：记录价格采集时间"
    - "渠道标注：标注价格来源渠道"
    - "促销识别：区分常态价和促销价"
  extraction_fields:
    - "竞品SKU"
    - "价格"
    - "价格变动时间"
    - "渠道"
    - "促销信息"
  annotation_format: "【内部-竞品情报-价格监控_{竞品名}_{日期}.xlsx】"
  privacy_level: "medium"
  fusion_rule: "与外部价格监测平台数据对比"

- category: "竞品与情报类"
  type: "竞品渠道策略文档"
  formats: [xlsx, pdf, docx]
  processing_rules:
    - "信息分级：区分公开信息和内部情报"
    - "地图标注：渠道分布可视化"
    - "策略提炼：提取可借鉴的策略要点"
  extraction_fields:
    - "渠道类型"
    - "覆盖区域"
    - "合作模式"
    - "策略特点"
    - "优劣势分析"
  annotation_format: "【内部-竞品情报-渠道策略_{竞品名}_{日期}.pdf】"
  privacy_level: "high"
  fusion_rule: "与外部渠道研究报告对比"

- category: "竞品与情报类"
  type: "竞品营销活动复盘"
  formats: [xlsx, pdf, pptx]
  processing_rules:
    - "效果量化：提取可量化的活动效果数据"
    - "成本估算：估算活动投入（如有数据）"
    - "ROI计算：计算活动投资回报率"
  extraction_fields:
    - "活动名称"
    - "活动时间"
    - "活动形式"
    - "目标受众"
    - "效果数据"
    - "投入估算"
  annotation_format: "【内部-竞品情报-营销复盘_{竞品名}_{活动名}_{日期}.pptx】"
  privacy_level: "medium"
  fusion_rule: "与外部营销案例库对比"

# =============================================================================
# 三、产品与供应链类 (Product & Supply Chain)
# =============================================================================

- category: "产品与供应链类"
  type: "供应链成本表"
  formats: [xlsx, csv]
  processing_rules:
    - "成本拆分：细化到原料/生产/物流各环节"
    - "时间维度：标注成本核算时间"
    - "敏感性处理：高敏感成本数据脱敏"
  extraction_fields:
    - "成本类型"
    - "成本金额"
    - "占比"
    - "变动趋势"
    - "影响因素"
  annotation_format: "【内部-供应链-成本表_{产品名}_{日期}.xlsx】"
  privacy_level: "high"
  fusion_rule: "与外部行业成本研究报告对比"

- category: "产品与供应链类"
  type: "产品配方/工艺文档"
  formats: [xlsx, pdf, docx]
  processing_rules:
    - "核心机密保护：关键配方参数脱敏"
    - "工艺标准化：统一工艺描述术语"
    - "版本管理：标注文档版本和生效时间"
  extraction_fields:
    - "产品名称"
    - "工艺类型"
    - "关键参数"
    - "质量标准"
    - "版本号"
  annotation_format: "【内部-产品-工艺文档_{产品名}_{版本}.pdf】"
  privacy_level: "high"
  fusion_rule: "与外部技术专利文献对比"

- category: "产品与供应链类"
  type: "供应商评估报告"
  formats: [xlsx, pdf]
  processing_rules:
    - "供应商编码：使用编码替代供应商名称"
    - "评分标准化：统一评估维度和权重"
    - "风险标注：标注供应风险等级"
  extraction_fields:
    - "供应商编码"
    - "评估维度"
    - "综合评分"
    - "风险等级"
    - "合作建议"
  annotation_format: "【内部-供应链-供应商评估_{日期}.xlsx】"
  privacy_level: "high"
  fusion_rule: "与外部供应链研究报告对比"

- category: "产品与供应链类"
  type: "质量检测数据"
  formats: [xlsx, csv]
  processing_rules:
    - "批次追溯：保留批次号用于追溯"
    - "指标对齐：与行业标准指标对齐"
    - "异常标注：标注不合格项和处理措施"
  extraction_fields:
    - "检测时间"
    - "产品批次"
    - "检测项目"
    - "检测结果"
    - "合格状态"
  annotation_format: "【内部-产品-质检数据_{产品名}_{日期}.xlsx】"
  privacy_level: "medium"
  fusion_rule: "与外部质量标准对比"

# =============================================================================
# 四、财务与战略类 (Finance & Strategy)
# =============================================================================

- category: "财务与战略类"
  type: "财务预算与ROI测算"
  formats: [xlsx, pdf]
  processing_rules:
    - "高度脱敏：所有金额数据脱敏处理"
    - "比例保留：保留占比和增长率等比例指标"
    - "假设标注：明确测算假设条件"
  extraction_fields:
    - "预算科目"
    - "预算金额（脱敏）"
    - "占比"
    - "ROI预测"
    - "假设条件"
  annotation_format: "【内部-财务-预算ROI_{项目名}_{财年}.xlsx】"
  privacy_level: "high"
  fusion_rule: "与外部行业平均ROI水平对比"

- category: "财务与战略类"
  type: "投资可行性分析"
  formats: [xlsx, pdf, docx]
  processing_rules:
    - "敏感数据脱敏：投资金额、预期收益脱敏"
    - "情景分析：保留多情景分析框架"
    - "风险提示：保留风险因素分析"
  extraction_fields:
    - "投资项目"
    - "投资规模（脱敏）"
    - "预期收益（脱敏）"
    - "回收期"
    - "风险因素"
    - "可行性结论"
  annotation_format: "【内部-战略-投资分析_{项目名}_{日期}.pdf】"
  privacy_level: "high"
  fusion_rule: "与外部投资案例对比"

- category: "财务与战略类"
  type: "战略规划文档"
  formats: [xlsx, pdf, docx, pptx]
  processing_rules:
    - "战略方向保留：保留战略方向和目标"
    - "具体数字脱敏：具体财务目标脱敏"
    - "时间线保留：保留战略时间节点"
  extraction_fields:
    - "战略主题"
    - "战略目标"
    - "关键举措"
    - "时间规划"
    - "里程碑"
  annotation_format: "【内部-战略-规划文档_{规划周期}.pdf】"
  privacy_level: "high"
  fusion_rule: "与外部行业趋势报告对比"

- category: "财务与战略类"
  type: "专利/技术文档"
  formats: [xlsx, pdf, docx]
  processing_rules:
    - "专利号保留：保留专利号用于公开查询"
    - "技术细节脱敏：核心技术参数脱敏"
    - "法律状态：标注专利法律状态"
  extraction_fields:
    - "专利名称"
    - "专利号"
    - "技术领域"
    - "法律状态"
    - "保护期限"
  annotation_format: "【内部-战略-专利清单_{日期}.xlsx】"
  privacy_level: "medium"
  fusion_rule: "与外部专利数据库对比"

# =============================================================================
# 五、组织与运营类 (Organization & Operations)
# =============================================================================

- category: "组织与运营类"
  type: "团队能力评估"
  formats: [xlsx, pdf]
  processing_rules:
    - "个人信息脱敏：姓名、联系方式脱敏"
    - "能力维度标准化：统一能力评估维度"
    - "对标分析：与行业能力标准对标"
  extraction_fields:
    - "岗位类型"
    - "能力维度"
    - "评估等级"
    - "差距分析"
    - "提升建议"
  annotation_format: "【内部-组织-能力评估_{部门}_{日期}.xlsx】"
  privacy_level: "high"
  fusion_rule: "与外部组织能力研究报告对比"

- category: "组织与运营类"
  type: "运营流程SOP"
  formats: [xlsx, pdf, docx]
  processing_rules:
    - "流程标准化：统一流程图符号和描述"
    - "版本管理：标注SOP版本和生效时间"
    - "优化建议：标注流程优化机会点"
  extraction_fields:
    - "流程名称"
    - "流程步骤"
    - "责任人"
    - "时间节点"
    - "关键控制点"
    - "版本号"
  annotation_format: "【内部-运营-SOP_{流程名}_{版本}.pdf】"
  privacy_level: "low"
  fusion_rule: "与外部最佳实践流程对比"

- category: "组织与运营类"
  type: "历史项目复盘"
  formats: [xlsx, pdf, pptx]
  processing_rules:
    - "项目信息脱敏：项目名称可保留，敏感细节脱敏"
    - "经验提炼：提取可复用的经验教训"
    - "数据保留：保留可公开的项目成果数据"
  extraction_fields:
    - "项目名称"
    - "项目周期"
    - "项目目标"
    - "关键成果"
    - "经验教训"
    - "最佳实践"
  annotation_format: "【内部-运营-项目复盘_{项目名}_{日期}.pptx】"
  privacy_level: "medium"
  fusion_rule: "与外部项目案例库对比"

# =============================================================================
# 全局处理规则
# =============================================================================

global_rules:

  # 隐私级别定义
  privacy_levels:
    high: "高度敏感，需严格脱敏，仅限核心团队访问"
    medium: "中度敏感，需部分脱敏，限制访问范围"
    low: "低敏感度，可适度共享"

  # 通用处理流程
  processing_workflow:
    - "step_1": "文件接收与分类"
    - "step_2": "隐私级别判定"
    - "step_3": "数据脱敏处理"
    - "step_4": "字段提取与标准化"
    - "step_5": "内部数据标注"
    - "step_6": "外部数据融合验证"
    - "step_7": "质量检查与归档"

  # 标注规范
  annotation_standards:
    - "所有内部文件标注时只写文件名，不写路径"
    - "标注格式：【内部-{大类}-{子类}_{标识}_{日期}.{格式}】"
    - "日期格式：YYYYMMDD"
    - "标识使用下划线连接"

  # 融合验证原则
  fusion_principles:
    - "内部数据不假设绝对正确，需与外部数据交叉验证"
    - "标注数据来源差异和可信度"
    - "冲突数据需人工复核确认"
    - "核心原则：融合而非覆盖，内部数据与外部数据并行比对"
